<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PBS | SAN Pairings</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --nav-blue: #005eb8; --nav-header: #2c3e50; --nav-bg: #f5f7f9; --nav-border: #dbe4eb; }
        body { font-family: 'Roboto', sans-serif; background: var(--nav-bg); margin: 0; font-size: 13px; }
        
        /* Top Navigation Bar */
        header { background: var(--nav-header); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #004a92; }
        .controls { background: white; border-bottom: 1px solid var(--nav-border); padding: 10px 20px; display: flex; gap: 20px; align-items: center; }
        
        /* Pairing List Container */
        .pairing-list { max-width: 1200px; margin: 20px auto; display: flex; flex-direction: column; gap: 2px; }

        /* Navblue Row Style */
        .pairing-row { background: white; border: 1px solid var(--nav-border); display: grid; grid-template-columns: 80px 1fr 100px; position: relative; }
        .id-tab { background: var(--nav-blue); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; border-right: 2px solid #004a92; }
        
        .main-info { padding: 10px 15px; }
        .info-top { display: grid; grid-template-columns: repeat(4, 1fr); margin-bottom: 5px; }
        .info-label { color: #555; font-size: 11px; margin-right: 5px; }
        .info-value { font-weight: bold; color: var(--nav-blue); }

        .days-badge { display: flex; align-items: center; justify-content: center; background: #ebf3fb; color: var(--nav-blue); font-weight: bold; border-left: 1px solid var(--nav-border); font-size: 11px; text-align: center; }

        /* Calendar Strip (1-30) */
        .calendar-row { grid-column: 1 / 4; border-top: 1px solid #f0f0f0; display: flex; padding: 5px 15px; background: #fff; }
        .cal-day { flex: 1; text-align: center; font-size: 10px; color: #999; padding: 2px; border-radius: 50%; }
        .cal-day.active { color: var(--nav-blue); font-weight: bold; background: #e0eefd; color: #000; border: 1px solid var(--nav-blue); }

        /* Inputs */
        select, input[type="number"] { padding: 5px; border: 1px solid #ccc; border-radius: 3px; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <div><strong>Bid Period:</strong> 2026-06-01 To 2026-06-30</div>
    <div>Pairings List (73G SAN)</div>
</header>

<div class="controls">
    <div>
        <strong>File:</strong> <input type="file" id="fileInput" accept=".txt">
    </div>
    <div>
        <strong>Length:</strong>
        <select id="lenFilter" onchange="processData()">
            <option value="all">All</option>
            <option value="1">1 Day</option>
            <option value="2">2 Day</option>
            <option value="3">3 Day</option>
            <option value="4">4 Day</option>
        </select>
    </div>
    <div>
        <strong>Sort:</strong>
        <select id="sortBy" onchange="processData()">
            <option value="id">Pairing ID</option>
            <option value="credit">High Credit</option>
            <option value="checkin">Check-In</option>
        </select>
    </div>
    <div>
        <strong>Off Day:</strong>
        <input type="number" id="offDay" min="1" max="30" style="width: 50px;" oninput="processData()">
    </div>
</div>

<div class="pairing-list" id="pairingList">
    </div>

<script>
    let rawPairings = [];

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            parseText(event.target.result);
            processData();
        };
        reader.readAsText(e.target.files[0]);
    });

    function parseText(text) {
        const blocks = text.split(/----------------------------------------------------------------------------------------------------/);
        rawPairings = [];

        blocks.forEach(block => {
            const top = block.match(/(\d{5})\s+Check-In\s+(\d{2}:\d{2})\s+Check-Out\s+(\d{2}:\d{2})\s+(\d)-Day/);
            const credit = block.match(/Credit:\s+(\d{2,3}:\d{2})/);
            const tafb = block.match(/TAFB:\s+(\d{2,3}:\d{2})/);
            
            // Extract airports found in the flight lines (3-letter codes like PDX, SEA, EWR)
            const airports = [...new Set(block.match(/\b[A-Z]{3}\b/g))].filter(a => a !== "SAN" && a !== "JUN").slice(0, 3);

            // Calendar dates found in the grid
            const dateMatches = [...block.matchAll(/\|\s*([\d\s-]{1,21})\s*\|/g)];
            let dates = [];
            dateMatches.forEach(match => {
                const numbers = match[1].split(/\s+/).filter(d => d !== "--" && d !== "" && !isNaN(d));
                dates = dates.concat(numbers.map(Number));
            });

            if (top) {
                rawPairings.push({
                    id: top[1],
                    checkin: top[2],
                    checkout: top[3],
                    days: parseInt(top[4]),
                    credit: credit ? credit[1] : "00:00",
                    creditVal: credit ? parseInt(credit[1].replace(':','')) : 0,
                    tafb: tafb ? tafb[1] : "00:00",
                    layovers: airports.join(', '),
                    activeDates: [...new Set(dates)]
                });
            }
        });
    }

    function processData() {
        const len = document.getElementById('lenFilter').value;
        const sort = document.getElementById('sortBy').value;
        const offDay = parseInt(document.getElementById('offDay').value);

        let filtered = rawPairings.filter(p => {
            const matchLen = (len === "all" || p.days == len);
            const matchOff = isNaN(offDay) || !p.activeDates.includes(offDay);
            return matchLen && matchOff;
        });

        filtered.sort((a, b) => {
            if (sort === 'credit') return b.creditVal - a.creditVal;
            if (sort === 'checkin') return a.checkin.localeCompare(b.checkin);
            return a.id.localeCompare(b.id);
        });

        render(filtered);
    }

    function render(list) {
        const container = document.getElementById('pairingList');
        container.innerHTML = list.map(p => {
            // Build the 1-30 calendar strip
            let calendarStrip = "";
            for (let i = 1; i <= 30; i++) {
                const isActive = p.activeDates.includes(i) ? "active" : "";
                calendarStrip += `<div class="cal-day ${isActive}">${i}</div>`;
            }

            return `
            <div class="pairing-row">
                <div class="id-tab"><div>18</div><div>${p.id.slice(-3)}</div></div>
                <div class="main-info">
                    <div class="info-top">
                        <span><span class="info-label">Check-In</span><span class="info-value">${p.checkin}</span></span>
                        <span><span class="info-label">Check-Out</span><span class="info-value">${p.checkout}</span></span>
                        <span><span class="info-label">Credit Value</span><span class="info-value">${p.credit}</span></span>
                        <span><span class="info-label">TAFB</span><span class="info-value">${p.tafb}</span></span>
                    </div>
                    <div style="font-size: 11px; color: #666;">
                        ${p.layovers} | CA, FO | 73G
                    </div>
                </div>
                <div class="days-badge">0${p.days}<br>Days</div>
                <div class="calendar-row">
                    ${calendarStrip}
                </div>
            </div>
            `;
        }).join('');
    }
</script>
</body>
</html>
