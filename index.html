<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PBS | SAN 73G Pairing Sorter</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --pbs-blue: #00457C; --pbs-yellow: #FFD200; --pbs-grey: #F4F4F4; }
        body { font-family: 'Montserrat', sans-serif; background: var(--pbs-grey); margin: 0; color: #333; }
        
        /* PBS Style Header */
        header { background: var(--pbs-blue); color: white; padding: 25px; border-bottom: 6px solid var(--pbs-yellow); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }

        .dashboard { display: grid; grid-template-columns: 300px 1fr; gap: 20px; padding: 20px; max-width: 1400px; margin: auto; }

        /* Sidebar Sorter */
        .sidebar { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); height: fit-content; }
        .filter-group { margin-bottom: 25px; }
        .filter-group h3 { font-size: 14px; text-transform: uppercase; color: var(--pbs-blue); border-bottom: 2px solid var(--pbs-grey); padding-bottom: 5px; }
        
        select, input { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .day-btn { flex: 1; padding: 8px; border: 1px solid var(--pbs-blue); background: white; cursor: pointer; font-weight: bold; }
        .day-btn.active { background: var(--pbs-blue); color: white; }

        /* Pairing Cards */
        .pairing-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 15px; }
        .card { background: white; border-left: 8px solid var(--pbs-blue); padding: 15px; border-radius: 4px; position: relative; transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); border-left-color: var(--pbs-yellow); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .id-badge { background: var(--pbs-blue); color: white; padding: 4px 8px; font-weight: bold; border-radius: 3px; }
        .credit-badge { color: var(--pbs-blue); font-weight: bold; font-size: 18px; }
        .times { font-size: 13px; color: #666; margin: 5px 0; }
        .calendar { font-family: monospace; font-size: 11px; background: #eee; padding: 5px; border-radius: 3px; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1>PUBLIC BROADCASTING SYSTEM | <span style="font-weight:400">SAN DIEGO PAIRING EXPLORER</span></h1>
</header>

<div class="dashboard">
    <div class="sidebar">
        <div class="filter-group">
            <h3>1. Load Data</h3>
            <input type="file" id="fileInput" accept=".txt">
        </div>

        <div class="filter-group">
            <h3>2. Trip Length</h3>
            <div class="btn-group">
                <button class="day-btn" onclick="setLength(1)">1D</button>
                <button class="day-btn" onclick="setLength(2)">2D</button>
                <button class="day-btn" onclick="setLength(3)">3D</button>
                <button class="day-btn" onclick="setLength(4)">4D</button>
                <button class="day-btn active" onclick="setLength('all')">ALL</button>
            </div>
        </div>

        <div class="filter-group">
            <h3>3. Sort Results</h3>
            <select id="sortOrder" onchange="applyFilters()">
                <option value="id">Pairing ID</option>
                <option value="credit">Total Credit (High to Low)</option>
                <option value="checkin">Earlier Check-In</option>
                <option value="tafb">TAFB (Length of Trip)</option>
            </select>
        </div>

        <div class="filter-group">
            <h3>4. Days Off Filter</h3>
            <p style="font-size: 11px;">Hide trips touching this date:</p>
            <input type="number" id="offDay" min="1" max="30" placeholder="Enter Day (e.g. 15)" oninput="applyFilters()">
        </div>
    </div>

    <div class="pairing-list" id="pairingList">
        </div>
</div>

<script>
    let rawPairings = [];
    let currentLength = 'all';

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => parsePairings(event.target.result);
        reader.readAsText(e.target.files[0]);
    });

    function parsePairings(text) {
        // Splitting by the long dashed line in your file
        const blocks = text.split('----------------------------------------------------------------------------------------------------');
        rawPairings = blocks.map(block => {
            const idMatch = block.match(/(\d{5})\s+Check-In\s+(\d{2}:\d{2})\s+Check-Out\s+(\d{2}:\d{2})\s+(\d)-Day/);
            const creditMatch = block.match(/Credit:\s+(\d{3}:\d{2})/);
            const tafbMatch = block.match(/TAFB:\s+(\d{3}:\d{2})/);
            
            // Extract the date numbers from the calendar grid
            const dateMatches = block.match(/\|\s*([\d\s-]{1,30})\s*\|/g);
            let workedDates = [];
            if(dateMatches) {
                workedDates = dateMatches.map(line => line.replace(/[|]/g, '').trim().split(/\s+/)).flat()
                             .filter(d => d !== '--' && d !== "").map(Number);
            }

            if (idMatch) {
                return {
                    id: idMatch[1],
                    checkin: idMatch[2],
                    checkout: idMatch[3],
                    days: parseInt(idMatch[4]),
                    credit: creditMatch ? creditMatch[1] : "000:00",
                    creditVal: creditMatch ? parseInt(creditMatch[1].replace(':','')) : 0,
                    tafb: tafbMatch ? tafbMatch[1] : "000:00",
                    workedDates: workedDates,
                    rawCalendar: dateMatches ? dateMatches.join('<br>') : ""
                };
            }
            return null;
        }).filter(p => p !== null);
        applyFilters();
    }

    function setLength(l) {
        currentLength = l;
        document.querySelectorAll('.day-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        const offDay = parseInt(document.getElementById('offDay').value);
        const sortKey = document.getElementById('sortOrder').value;

        let filtered = rawPairings.filter(p => {
            const lenMatch = (currentLength === 'all' || p.days == currentLength);
            const dateMatch = isNaN(offDay) || !p.workedDates.includes(offDay);
            return lenMatch && dateMatch;
        });

        // Sorting Logic
        filtered.sort((a, b) => {
            if(sortKey === 'credit') return b.creditVal - a.creditVal;
            if(sortKey === 'checkin') return a.checkin.localeCompare(b.checkin);
            return a[sortKey].toString().localeCompare(b[sortKey].toString());
        });

        render(filtered);
    }

    function render(list) {
        const container = document.getElementById('pairingList');
        container.innerHTML = list.map(p => `
            <div class="card">
                <div class="card-header">
                    <span class="id-badge">${p.id}</span>
                    <span class="credit-badge">${p.credit}</span>
                </div>
                <div style="font-weight:bold; color:var(--pbs-blue);">${p.days}-Day SAN Pairing</div>
                <div class="times"><strong>REPORT:</strong> ${p.checkin} | <strong>RELEASE:</strong> ${p.checkout}</div>
                <div class="times"><strong>TAFB:</strong> ${p.tafb}</div>
                <div class="calendar">${p.workedDates.length > 0 ? 'Operating Dates: ' + p.workedDates.join(', ') : 'Daily/No Grid'}</div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
